# Codeberg Forgejo Actions validation
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: codeberg-small
    container:
      image: rust:1.90
    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git fetch --depth=1 origin "$GITHUB_SHA"
          git checkout --detach "$GITHUB_SHA"

      - name: Check formatting
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release
